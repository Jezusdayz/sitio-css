<!DOCTYPE html>

    <link rel="stylesheet" href="style.css">

<body id="main-layout">

    <nav class="navbar-sticky">
        <div class="nav-container">
            <span class="logo">GamingBlog</span>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Inicio</a></li>

    <main class="container">
        <section class="flex-wrapper space-evenly">

                    <h2 title="survival-game">Don't Starve</h2>

                </div>

            <article class="game-card">
                <img src="img/Terra.png" alt="Terraria" class="game-img">
                <div class="game-content space-between-content">
                    <h2>Terraria</h2>
                    <p>WIP</p>
                    <span class="badge">Exploración</span>
                </div>
            </article>

            <article class="game-card">
                <div class="game-content space-around-content">
                    <h2>Próximamente</h2>
                    <p>Más títulos aquí</p>
                </div>
