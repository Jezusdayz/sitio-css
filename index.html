<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi super sitio web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="main-layout">

    <nav class="navbar-sticky">
        <div class="nav-container">
            <span class="logo">GamingBlog</span>
            <ul class="nav-links">
                <li>Inicio</li>
                <li>Juegos</li>
                <li>Contacto</li>
            </ul>
        </div>
    </nav>

    <header class="site-header">
        <h1 id="main-title">Mis juegos favoritos</h1>
        <p>Un espacio para mis títulos preferidos</p>
    </header>

    <main class="container">
        <section class="flex-wrapper">
            <article class="game-card" id="featured-item">
                <img src="img/DS.webp" alt="Don't Starve" class="game-img">
                <div class="game-content">
                    <h2 title="survival-game">Don't Starve</h2>
                    <p>WIP</p>
                </div>
            </article>

            <article class="game-card row-reverse">
                <img src="img/Terra.png" alt="Terraria" class="game-img">
                <div class="game-content">
                    <h2>Terraria</h2>
                    <p>WIP</p>
                </div>
            </article>
        </section>
    </main>

    <div class="fixed-badge">TOP 2026</div>

    <footer class="site-footer">
        <p>&copy; 2026 jezusdayz </p>
    </footer>

</body>
</html>
