<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi super sitio web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Mis juegos favoritos</h1>
        <p>Un espacio para mis títulos preferidos</p>
    </header>

    <main class="container">
        <article class="game-card">
            <img src="img/DS.webp" alt="Portada de Juego 1" class="game-img">
            <div class="game-content">
                <h2>Don't Starve</h2>
                <p>Aquí puedes escribir por qué este juego es especial para ti, su historia o tu reseña personal.</p>
            </div>
        </article>

        <article class="game-card">
            <img src="img/Terra.png" alt="Portada de Juego 2" class="game-img">
            <div class="game-content">
                <h2>Terraria</h2>
                <p>Añade los detalles técnicos o los momentos más épicos que viviste jugando este título.</p>
            </div>
        </article>
    </main>

    <footer>
        <p>&copy; 2026 jezusdayz </p>
    </footer>
